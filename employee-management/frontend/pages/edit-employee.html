<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Employee - Employee Management</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div id="app"></div>
<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
document.getElementById('app').innerHTML = renderLayout('Edit Employee', 'employees') + `
  <div class="page-header">
    <div>
      <h2>Edit Employee</h2>
      <p class="breadcrumb">Employees &rsaquo; Edit</p>
    </div>
    <a href="employees.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to List</a>
  </div>
  <div id="alertBox"></div>
  <div id="formContainer">
    <div class="loading"><div class="spinner"></div> Loading employee...</div>
  </div>
` + closeLayout();

const params = new URLSearchParams(window.location.search);
const empId = params.get('id');

if (!empId) {
  window.location.href = 'employees.html';
}

const errIds = { name:'nameErr', email:'emailErr', phoneNumber:'phoneErr', department:'deptErr', designation:'desigErr', salary:'salaryErr' };

function renderForm(emp) {
  document.getElementById('formContainer').innerHTML = `
    <div class="card">
      <form id="empForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name <span style="color:var(--danger)">*</span></label>
            <input type="text" id="name" class="form-control" value="${emp.name}"/>
            <span class="field-error" id="nameErr"></span>
          </div>
          <div class="form-group">
            <label>Email Address <span style="color:var(--danger)">*</span></label>
            <input type="email" id="email" class="form-control" value="${emp.email}"/>
            <span class="field-error" id="emailErr"></span>
          </div>
          <div class="form-group">
            <label>Phone Number <span style="color:var(--danger)">*</span></label>
            <input type="text" id="phoneNumber" class="form-control" value="${emp.phoneNumber}"/>
            <span class="field-error" id="phoneErr"></span>
          </div>
          <div class="form-group">
            <label>Department <span style="color:var(--danger)">*</span></label>
            <select id="department" class="form-control">
              <option value="">Select Department</option>
              ${['Engineering','Marketing','HR','Finance','Operations','Sales']
                .map(d => `<option ${emp.department === d ? 'selected' : ''}>${d}</option>`).join('')}
            </select>
            <span class="field-error" id="deptErr"></span>
          </div>
          <div class="form-group">
            <label>Designation <span style="color:var(--danger)">*</span></label>
            <input type="text" id="designation" class="form-control" value="${emp.designation}"/>
            <span class="field-error" id="desigErr"></span>
          </div>
          <div class="form-group">
            <label>Salary (USD) <span style="color:var(--danger)">*</span></label>
            <input type="number" id="salary" class="form-control" value="${emp.salary}" min="1" step="0.01"/>
            <span class="field-error" id="salaryErr"></span>
          </div>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
          <button type="submit" class="btn btn-primary" id="submitBtn" data-original="<i class='fas fa-save'></i> Update Employee">
            <i class="fas fa-save"></i> Update Employee
          </button>
          <a href="employees.html" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>`;

  document.getElementById('empForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    Object.values(errIds).forEach(id => document.getElementById(id).textContent = '');

    const data = {
      name: document.getElementById('name').value.trim(),
      email: document.getElementById('email').value.trim(),
      phoneNumber: document.getElementById('phoneNumber').value.trim(),
      department: document.getElementById('department').value,
      designation: document.getElementById('designation').value.trim(),
      salary: parseFloat(document.getElementById('salary').value)
    };

    let valid = true;
    if (!data.name) { document.getElementById('nameErr').textContent = 'Name is required'; valid = false; }
    if (!data.email || !/\S+@\S+\.\S+/.test(data.email)) { document.getElementById('emailErr').textContent = 'Valid email required'; valid = false; }
    if (!data.phoneNumber || !/^[0-9]{10,15}$/.test(data.phoneNumber)) { document.getElementById('phoneErr').textContent = 'Phone must be 10-15 digits'; valid = false; }
    if (!data.department) { document.getElementById('deptErr').textContent = 'Department is required'; valid = false; }
    if (!data.designation) { document.getElementById('desigErr').textContent = 'Designation is required'; valid = false; }
    if (!data.salary || data.salary <= 0) { document.getElementById('salaryErr').textContent = 'Salary must be > 0'; valid = false; }
    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    setLoading(btn, true);
    try {
      await api.updateEmployee(empId, data);
      showAlert(document.getElementById('alertBox'), 'Employee updated successfully! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'employees.html', 1200);
    } catch(err) {
      showAlert(document.getElementById('alertBox'), err.message, 'error');
      setLoading(btn, false);
    }
  });
}

(async function load() {
  try {
    const emp = await api.getEmployee(empId);
    renderForm(emp);
  } catch(err) {
    document.getElementById('formContainer').innerHTML =
      `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ${err.message}</div>`;
  }
})();
</script>
</body>
</html>
