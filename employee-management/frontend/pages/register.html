<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Employee Management</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card" style="max-width:480px">
    <div class="logo">
      <i class="fas fa-user-plus"></i>
      <h2>Create Account</h2>
      <p class="subtitle">Register as an admin user</p>
    </div>
    <div id="alertBox"></div>
    <form id="registerForm">
      <div class="form-grid" style="margin-bottom:1rem">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required/>
          <span class="field-error" id="nameErr"></span>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="john@company.com" required/>
          <span class="field-error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required/>
          <span class="field-error" id="passwordErr"></span>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm" class="form-control" placeholder="Repeat password" required/>
          <span class="field-error" id="confirmErr"></span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="registerBtn" data-original="Create Account">
        Create Account
      </button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--text-light)">
      Already have an account? <a href="../index.html" style="color:var(--primary);text-decoration:none;font-weight:500">Sign In</a>
    </p>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    let valid = true;

    ['nameErr','emailErr','passwordErr','confirmErr'].forEach(id => document.getElementById(id).textContent = '');

    if (name.length < 2) { document.getElementById('nameErr').textContent = 'Name must be at least 2 characters'; valid = false; }
    if (!/\S+@\S+\.\S+/.test(email)) { document.getElementById('emailErr').textContent = 'Invalid email'; valid = false; }
    if (password.length < 6) { document.getElementById('passwordErr').textContent = 'Min 6 characters'; valid = false; }
    if (password !== confirm) { document.getElementById('confirmErr').textContent = 'Passwords do not match'; valid = false; }

    if (!valid) return;

    const btn = document.getElementById('registerBtn');
    setLoading(btn, true);

    setTimeout(() => {
      auth.login({ name, email, role: 'Admin' });
      showAlert(document.getElementById('alertBox'), 'Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }, 800);
  });
</script>
</body>
</html>
