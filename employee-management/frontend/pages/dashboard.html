<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Employee Management</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div id="app"></div>
<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
document.getElementById('app').innerHTML = renderLayout('Dashboard', 'dashboard') + `
  <div class="stats-grid" id="statsGrid">
    <div class="loading"><div class="spinner"></div> Loading stats...</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem" class="dashboard-grid">
    <div class="card">
      <h3 style="font-size:1rem;font-weight:600;margin-bottom:0.25rem">Employees by Department</h3>
      <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:1rem">Distribution across departments</p>
      <div id="deptChart"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="card">
      <h3 style="font-size:1rem;font-weight:600;margin-bottom:0.25rem">Recent Employees</h3>
      <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:1rem">Latest additions to the team</p>
      <div id="recentList"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
` + closeLayout();

async function loadDashboard() {
  try {
    const [stats, employees] = await Promise.all([api.getDashboard(), api.getEmployees()]);

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-users"></i></div>
        <div class="stat-info"><h3>${stats.totalEmployees}</h3><p>Total Employees</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="fas fa-dollar-sign"></i></div>
        <div class="stat-info"><h3>${formatCurrency(stats.totalSalary)}</h3><p>Total Salary</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange"><i class="fas fa-chart-line"></i></div>
        <div class="stat-info"><h3>${formatCurrency(stats.avgSalary)}</h3><p>Average Salary</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple"><i class="fas fa-building"></i></div>
        <div class="stat-info"><h3>${Object.keys(stats.employeesByDepartment).length}</h3><p>Departments</p></div>
      </div>`;

    const depts = stats.employeesByDepartment;
    const maxVal = Math.max(...Object.values(depts), 1);
    document.getElementById('deptChart').innerHTML = `
      <div class="dept-chart">
        ${Object.entries(depts).map(([dept, count]) => `
          <div class="dept-bar">
            <div class="dept-bar-label"><span>${dept}</span><span>${count}</span></div>
            <div class="dept-bar-track">
              <div class="dept-bar-fill" style="width:${(count/maxVal)*100}%"></div>
            </div>
          </div>`).join('')}
      </div>`;

    const recent = employees.slice(-5).reverse();
    document.getElementById('recentList').innerHTML = recent.length
      ? `<div style="display:flex;flex-direction:column;gap:0.75rem">
          ${recent.map(e => `
            <div style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid var(--border)">
              <div class="avatar" style="width:32px;height:32px;font-size:0.75rem;flex-shrink:0">${e.name.charAt(0)}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:500;font-size:0.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.name}</div>
                <div style="font-size:0.75rem;color:var(--text-light)">${e.designation} · ${e.department}</div>
              </div>
            </div>`).join('')}
        </div>`
      : '<p style="color:var(--text-light);text-align:center;padding:1rem">No employees yet</p>';

  } catch(err) {
    document.getElementById('statsGrid').innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ${err.message}</div>`;
  }
}

loadDashboard();
</script>
<style>
  @media(max-width:768px){ .dashboard-grid{ grid-template-columns:1fr !important; } }
</style>
</body>
</html>
