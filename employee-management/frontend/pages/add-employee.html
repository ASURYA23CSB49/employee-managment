<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Employee - Employee Management</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div id="app"></div>
<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
document.getElementById('app').innerHTML = renderLayout('Add Employee', 'add') + `
  <div class="page-header">
    <div>
      <h2>Add New Employee</h2>
      <p class="breadcrumb">Employees &rsaquo; Add New</p>
    </div>
    <a href="employees.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to List</a>
  </div>
  <div id="alertBox"></div>
  <div class="card">
    <form id="empForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name <span style="color:var(--danger)">*</span></label>
          <input type="text" id="name" class="form-control" placeholder="John Doe"/>
          <span class="field-error" id="nameErr"></span>
        </div>
        <div class="form-group">
          <label>Email Address <span style="color:var(--danger)">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="john@company.com"/>
          <span class="field-error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label>Phone Number <span style="color:var(--danger)">*</span></label>
          <input type="text" id="phoneNumber" class="form-control" placeholder="10-15 digits"/>
          <span class="field-error" id="phoneErr"></span>
        </div>
        <div class="form-group">
          <label>Department <span style="color:var(--danger)">*</span></label>
          <select id="department" class="form-control">
            <option value="">Select Department</option>
            <option>Engineering</option>
            <option>Marketing</option>
            <option>HR</option>
            <option>Finance</option>
            <option>Operations</option>
            <option>Sales</option>
          </select>
          <span class="field-error" id="deptErr"></span>
        </div>
        <div class="form-group">
          <label>Designation <span style="color:var(--danger)">*</span></label>
          <input type="text" id="designation" class="form-control" placeholder="Software Engineer"/>
          <span class="field-error" id="desigErr"></span>
        </div>
        <div class="form-group">
          <label>Salary (USD) <span style="color:var(--danger)">*</span></label>
          <input type="number" id="salary" class="form-control" placeholder="50000" min="1" step="0.01"/>
          <span class="field-error" id="salaryErr"></span>
        </div>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
        <button type="submit" class="btn btn-primary" id="submitBtn" data-original="<i class='fas fa-save'></i> Save Employee">
          <i class="fas fa-save"></i> Save Employee
        </button>
        <a href="employees.html" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
` + closeLayout();

const fields = ['name','email','phoneNumber','department','designation','salary'];
const errIds = { name:'nameErr', email:'emailErr', phoneNumber:'phoneErr', department:'deptErr', designation:'desigErr', salary:'salaryErr' };

function clearErrors() {
  Object.values(errIds).forEach(id => document.getElementById(id).textContent = '');
  fields.forEach(f => document.getElementById(f).classList.remove('error'));
}

function showFieldError(field, msg) {
  document.getElementById(errIds[field]).textContent = msg;
  document.getElementById(field).classList.add('error');
}

document.getElementById('empForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearErrors();

  const data = {
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    phoneNumber: document.getElementById('phoneNumber').value.trim(),
    department: document.getElementById('department').value,
    designation: document.getElementById('designation').value.trim(),
    salary: parseFloat(document.getElementById('salary').value)
  };

  let valid = true;
  if (!data.name) { showFieldError('name', 'Name is required'); valid = false; }
  if (!data.email || !/\S+@\S+\.\S+/.test(data.email)) { showFieldError('email', 'Valid email is required'); valid = false; }
  if (!data.phoneNumber || !/^[0-9]{10,15}$/.test(data.phoneNumber)) { showFieldError('phoneNumber', 'Phone must be 10-15 digits'); valid = false; }
  if (!data.department) { showFieldError('department', 'Department is required'); valid = false; }
  if (!data.designation) { showFieldError('designation', 'Designation is required'); valid = false; }
  if (!data.salary || data.salary <= 0) { showFieldError('salary', 'Salary must be greater than 0'); valid = false; }
  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  setLoading(btn, true);
  try {
    await api.createEmployee(data);
    showAlert(document.getElementById('alertBox'), 'Employee added successfully! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'employees.html', 1200);
  } catch(err) {
    showAlert(document.getElementById('alertBox'), err.message, 'error');
    setLoading(btn, false);
  }
});
</script>
</body>
</html>
