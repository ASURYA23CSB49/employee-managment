<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Employee Management</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="logo">
      <i class="fas fa-users-cog"></i>
      <h2>Employee Management</h2>
      <p class="subtitle">Sign in to your account</p>
    </div>
    <div id="alertBox"></div>
    <form id="loginForm">
      <div class="form-group" style="margin-bottom:1rem">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="admin@company.com" required/>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label for="password">Password</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required/>
          <button type="button" id="togglePwd" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-light)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn" data-original="Sign In">
        Sign In
      </button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--text-light)">
      Don't have an account? <a href="pages/register.html" style="color:var(--primary);text-decoration:none;font-weight:500">Register</a>
    </p>
    <div class="alert alert-info" style="margin-top:1rem;font-size:0.8rem">
      <i class="fas fa-info-circle"></i>&nbsp;Demo: admin@company.com / admin123
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
  // Demo credentials
  const DEMO_USERS = [
    { email: 'admin@company.com', password: 'admin123', name: 'Admin User', role: 'Admin' }
  ];

  document.getElementById('togglePwd').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    icon.className = pwd.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
  });

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    setLoading(btn, true);

    setTimeout(() => {
      const user = DEMO_USERS.find(u => u.email === email && u.password === password);
      if (user) {
        auth.login(user);
        window.location.href = 'pages/dashboard.html';
      } else {
        showAlert(alertBox, 'Invalid email or password', 'error');
        setLoading(btn, false);
      }
    }, 600);
  });

  if (auth.getUser()) window.location.href = 'pages/dashboard.html';
</script>
</body>
</html>
